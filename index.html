<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Giant Program — Day Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #2E4057;
    --dark:    #1a2535;
    --mid-bg:  #3d5270;
    --gold:    #C9A84C;
    --white:   #ffffff;
    --off:     #f0f3f7;
    --muted:   #8A9BB0;
    --border:  rgba(201,168,76,0.18);
    --card:    rgba(255,255,255,0.04);
    --blue:    #7eb8f7;
    --green:   #8ddcb0;
    --red:     #e88888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(46,64,87,0.5) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 40px; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px, 10vw, 72px); line-height: 0.9; letter-spacing: 0.03em; color: var(--white); margin-bottom: 6px; }
  h1 span { color: var(--gold); }
  .header-sub { font-size: 13px; color: var(--muted); font-weight: 300; letter-spacing: 0.04em; }
  .gold-line { width: 60px; height: 2px; background: var(--gold); margin: 16px auto; }

  /* ── Inputs ── */
  .input-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 2px; padding: 28px; margin-bottom: 32px;
  }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .input-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-group { display: flex; flex-direction: column; gap: 7px; }
  label { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }
  label span { color: var(--muted); font-size: 9px; text-transform: none; letter-spacing: 0; }

  select, input[type="number"] {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2px; color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    padding: 11px 14px; width: 100%; outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  select:focus, input[type="number"]:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
  select option { background: var(--dark); color: var(--white); }
  input[type="number"]::-webkit-inner-spin-button { opacity: 0.3; }

  .unit-toggle { display: flex; border: 1px solid rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
  .unit-btn {
    flex: 1; background: transparent; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    padding: 11px; cursor: pointer; transition: all 0.2s;
  }
  .unit-btn.active { background: var(--gold); color: var(--dark); }

  /* ── Empty state ── */
  #emptyState { text-align: center; padding: 56px 24px; color: var(--muted); }
  .empty-icon { font-size: 44px; margin-bottom: 16px; opacity: 0.35; }
  #emptyState p { font-size: 14px; font-weight: 300; letter-spacing: 0.04em; line-height: 1.6; }

  /* ── Session sections ── */
  .session-block { margin-bottom: 32px; }

  .block-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .block-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; color: var(--gold); }
  .block-tag {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 9px; border-radius: 2px;
  }
  .tag-wu  { background: rgba(138,155,176,0.15); color: var(--muted); border: 1px solid rgba(138,155,176,0.25); }
  .tag-gb  { background: rgba(220,80,80,0.12);   color: var(--red);   border: 1px solid rgba(220,80,80,0.25); }
  .tag-vol { background: rgba(126,184,247,0.12); color: var(--blue);  border: 1px solid rgba(126,184,247,0.25); }
  .tag-sk  { background: rgba(201,168,76,0.12);  color: var(--gold);  border: 1px solid rgba(201,168,76,0.25); }
  .tag-cd  { background: rgba(141,220,176,0.12); color: var(--green); border: 1px solid rgba(141,220,176,0.25); }

  .diff-pill {
    margin-left: auto;
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 2px;
  }
  .diff-hard   { background: rgba(220,80,80,0.15);   color: var(--red);   border: 1px solid rgba(220,80,80,0.3); }
  .diff-medium { background: rgba(201,168,76,0.15);  color: var(--gold);  border: 1px solid rgba(201,168,76,0.3); }
  .diff-light  { background: rgba(100,180,120,0.15); color: var(--green); border: 1px solid rgba(100,180,120,0.3); }

  /* ── Exercise cards ── */
  .ex-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 2px; margin-bottom: 8px; overflow: hidden;
  }
  .ex-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .ex-name { font-size: 13px; font-weight: 600; letter-spacing: 0.03em; color: var(--off); }
  .ex-role { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

  .ex-row {
    display: grid; grid-template-columns: 90px 1fr auto;
    align-items: center; padding: 7px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.03); gap: 8px;
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-label  { font-size: 12px; color: var(--muted); }
  .ex-detail { font-size: 13px; color: var(--off); }
  .ex-weight { font-size: 15px; font-weight: 600; text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .ex-weight.gold  { color: var(--gold); }
  .ex-weight.blue  { color: var(--blue); }
  .ex-weight.muted { color: var(--muted); font-size: 13px; font-weight: 400; }
  .ex-weight.green { color: var(--green); }
  .ex-weight.plain { color: var(--off); }

  /* Skill sub-section header */
  .sk-group-title {
    font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold); padding: 10px 14px 4px; opacity: 0.7;
  }

  /* Circuit label */
  .circuit-note {
    font-size: 11px; color: var(--muted); letter-spacing: 0.08em;
    padding: 6px 14px; background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-style: italic;
  }

  .block-note {
    font-size: 12px; color: var(--muted); font-style: italic;
    margin-top: 6px; padding-left: 12px;
    border-left: 2px solid var(--border); line-height: 1.5;
  }

  /* footer */
  footer { text-align: center; margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--border); }
  footer p { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.15em; color: var(--muted); }

  @media (max-width: 520px) {
    .input-grid { grid-template-columns: 1fr 1fr; }
    .container { padding: 24px 14px 60px; }
    .input-card { padding: 18px 14px; }
    .ex-row { grid-template-columns: 64px 1fr auto; padding: 7px 10px; }
  }
  @media (max-width: 360px) { .input-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">Session Planner</div>
    <h1>THE <span>GIANT</span><br>PROGRAM</h1>
    <div class="gold-line"></div>
    <p class="header-sub">Select your day, difficulty and top weight — full session generated instantly</p>
  </header>

  <div class="input-card">
    <div class="input-grid">
      <div class="field-group">
        <label>Training Day</label>
        <select id="day">
          <option value="deadlift">Deadlift Day</option>
          <option value="ohp">OHP Day</option>
          <option value="squat">Squat Day</option>
          <option value="bench">Bench Day</option>
        </select>
      </div>
      <div class="field-group">
        <label>Difficulty</label>
        <select id="difficulty">
          <option value="hard">Hard</option>
          <option value="medium">Medium</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="field-group">
        <label>Unit</label>
        <div class="unit-toggle">
          <button class="unit-btn active" onclick="setUnit('kg')">kg</button>
          <button class="unit-btn" onclick="setUnit('lb')">lb</button>
        </div>
      </div>
    </div>
    <div class="input-row2">
      <div class="field-group">
        <label>Top Set — Main Lift</label>
        <input type="number" id="topWeight" placeholder="e.g. 120" min="1" step="0.5">
      </div>
      <div class="field-group">
        <label>Top Set — Antagonist <span>(optional, upper days)</span></label>
        <input type="number" id="topWeightB" placeholder="e.g. 70" min="1" step="0.5">
      </div>
    </div>
  </div>

  <div id="emptyState">
    <div class="empty-icon">🏋️</div>
    <p>Select your training day and enter<br>your top set weight to generate<br>the full session plan</p>
  </div>

  <div id="results"></div>

  <footer>
    <p>Train Hard &nbsp;·&nbsp; Train Smart &nbsp;·&nbsp; Stay Capable</p>
  </footer>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const SCHEMES = {
  hard:   { sets:[8,6,4,2],   pcts:[0.75,0.82,0.90,1.00], volReps:6  },
  medium: { sets:[9,7,5,3],   pcts:[0.72,0.80,0.88,1.00], volReps:8  },
  light:  { sets:[10,8,6,4],  pcts:[0.70,0.78,0.86,1.00], volReps:10 },
};
const WU_PCTS = [0.40,0.55,0.70,0.85];
const WU_REPS = [8,5,3,2];
const PULLUP_REPS = { hard:10, medium:8, light:6 };

const DAYS = {
  deadlift: {
    label:'Deadlift Day', type:'lower',
    main:'Deadlift', antagonist:'Sørensen Hold', antagonistType:'hold',
    core:'Ab Rollout',
    warmupDrills:[
      '2 min row / bike / jump rope',
      'Jefferson curl × 5 slow reps',
      'Empty bar Romanian DL × 8 — hamstring stretch focus',
    ],
    cooldown:{ name:'Forward Fold', duration:'2 min' },
    skill:[
      { title:'Animal Flow', tag:'5 min', rows:[
        { label:'Flow', detail:'Beast crawl 10m → side kickthrough × 3/side → beast-to-crab × 3/dir → crab reach × 5/side → underswitch × 4 → croc crawl 10m', weight:'Bodyweight' },
      ]},
      { title:'Turkish Get-Up', tag:'10–15 min', rows:[
        { label:'Weight',   detail:'Starting weight — increase when 5–6/side feels unhurried for 2–3 sessions', weight:'12 kg' },
        { label:'Reps',     detail:'5–6 per side, alternating — 10–12 total get-ups', weight:'—' },
        { label:'Rest',     detail:'Full rest between reps — stand, breathe, reset', weight:'—' },
        { label:'Progress', detail:'12 → 16 → 20 → 24 kg (kettlebell increments)', weight:'—' },
      ]},
      { title:'Floor-to-Stand Variations', tag:'5 min', rows:[
        { label:'Seq 1', detail:'Cross-legged stand × 3 (no hands, no knees)', weight:'BW' },
        { label:'Seq 2', detail:'Shin box get-up × 3 each side', weight:'BW' },
        { label:'Seq 3', detail:'Roll to squat stand × 4', weight:'BW' },
        { label:'Seq 4', detail:'Roll to lunge stand × 3 each side', weight:'BW' },
      ]},
    ],
  },
  ohp: {
    label:'OHP Day', type:'upper',
    main:'Overhead Press', antagonist:'Pull-ups', antagonistType:'bw',
    core:'GHD Abs', coreFallback:'Hollow Body Hold if GHD unavailable',
    warmupDrills:[
      '2 min light row or arm circles',
      'Prone banded shoulder extension × 10',
      'Empty bar press × 10 — pause at top',
      'Dead hang × 20–30 sec + 3–5 scapular pulls',
    ],
    cooldown:{ name:'Anterior Line Stretch', duration:'2 min per side' },
    skill:[
      { title:'Farmer\'s Carry Warm-Up', tag:'5 min', rows:[
        { label:'Load',   detail:'Light — grip and trunk engagement only', weight:'~20 kg' },
        { label:'Volume', detail:'2–3 lengths of available space', weight:'—' },
      ]},
      { title:'Suitcase Carry', tag:'20 min (alternating)', rows:[
        { label:'Load',     detail:'Starting weight — adjust based on feel', weight:'20–24 kg' },
        { label:'Distance', detail:'Per side', weight:'20–30 m' },
        { label:'Sets',     detail:'Per side — rest between sets', weight:'3–4' },
        { label:'Focus',    detail:'Do not lean toward loaded side', weight:'—' },
        { label:'Progress', detail:'Distance before load: 30m → 40m → add weight', weight:'—' },
      ]},
      { title:'Overhead Carry', tag:'(within 20 min block)', rows:[
        { label:'Load',     detail:'Light — shoulder already fatigued from pressing', weight:'12–16 kg' },
        { label:'Distance', detail:'Per side', weight:'20 m' },
        { label:'Sets',     detail:'Per side — rest between sets', weight:'3–4' },
        { label:'Focus',    detail:'Shoulder packed, ribs down, steady overhead position', weight:'—' },
        { label:'Progress', detail:'Distance before load: 20m → 30m → add weight', weight:'—' },
      ]},
      { title:'Bear Crawl', tag:'5 min', rows:[
        { label:'Forward',  detail:'Slow and controlled, hips low', weight:'10 m' },
        { label:'Backward', detail:'', weight:'10 m' },
        { label:'Lateral',  detail:'Each side', weight:'5 m' },
        { label:'Rounds',   detail:'Repeat sequence', weight:'2–3×' },
      ]},
    ],
  },
  squat: {
    label:'Squat Day', type:'lower',
    main:'Back Squat', antagonist:'Copenhagen Plank', antagonistType:'hold',
    core:'Leg Raises',
    warmupDrills:[
      '2 min row / bike',
      'Reverse nordic × 5 slow reps',
      'Goblet squat × 8 deep and slow',
    ],
    cooldown:{ name:'Couch Stretch', duration:'2 min per side' },
    skill:[
      { title:'Single Leg Prep', tag:'5 min', rows:[
        { label:'Step 1', detail:'Single leg RDL × 8 each side — BW, balance focus', weight:'BW' },
        { label:'Step 2', detail:'Single leg calf raise × 10 each side — slow tempo', weight:'BW' },
        { label:'Step 3', detail:'Lateral step-overs × 10 each direction', weight:'BW' },
      ]},
      { title:'Jump Rope — Double Unders', tag:'20 min', rows:[
        { label:'Phase',    detail:'Current level: DUs established, ~50 max unbroken', weight:'—' },
        { label:'Sets',     detail:'Max unbroken DU sets — full rest between', weight:'3–4' },
        { label:'Track',    detail:'Log max unbroken set in notebook each session', weight:'—' },
        { label:'Skill',    detail:'5–10 min on ONE variation: crosses / single leg / alternate leg', weight:'—' },
        { label:'Target',   detail:'Next milestone: 100 unbroken', weight:'—' },
      ]},
      { title:'Bounding & Hopping', tag:'5 min', rows:[
        { label:'Step 1', detail:'Single leg hops in place × 10 each side', weight:'BW' },
        { label:'Step 2', detail:'Lateral bounds × 5 each direction', weight:'BW' },
        { label:'Step 3', detail:'Small hurdle hops × 10 (if available)', weight:'BW' },
      ]},
    ],
  },
  bench: {
    label:'Bench Day', type:'upper',
    main:'Bench Press', antagonist:'Barbell Row', antagonistType:'weighted',
    core:'GHD Back Extension',
    warmupDrills:[
      '2 min light movement',
      'Skin the cat × 3–5 controlled reps',
      'Empty bar bench × 10 — pause at bottom',
      'Band pull-apart × 15 reps × 2 sets, controlled tempo',
    ],
    cooldown:{ name:'Bottom of Dip Hold', duration:'2 min' },
    skill:[
      { title:'Muscle-Up Progressions', tag:'Phase 1 — 20 min', rows:[
        { label:'Step 1', detail:'Ring rows × 8–10 — body as horizontal as possible', weight:'3 sets' },
        { label:'Step 2', detail:'Jumping MU negatives × 3–5 — slow lowering', weight:'3 sets' },
        { label:'Step 3', detail:'Banded MU transitions × 3–5 — focus turn-over', weight:'3 sets' },
        { label:'Step 4', detail:'Strict MU attempts × 3–5 quality attempts (once pull-ups unbroken)', weight:'—' },
      ]},
      { title:'Sandbag Work', tag:'Phase 2 — replaces MU (20 min)', rows:[
        { label:'Exercise 1', detail:'Sandbag clean × 5 reps', weight:'3–4 sets' },
        { label:'Exercise 2', detail:'Sandbag carry × 20–30m (shoulder / bear hug / over-shoulder)', weight:'3–4 sets' },
        { label:'Exercise 3', detail:'Sandbag shouldering × 3–5 reps each side', weight:'—' },
        { label:'Load',       detail:'Start moderate, increase when load feels controlled', weight:'—' },
      ]},
      { title:'Rope Flow', tag:'5–10 min (permanent)', rows:[
        { label:'Pace',     detail:'Slow and fluid — never rushed', weight:'—' },
        { label:'Progress', detail:'Basic waves → figure-8s → side circles → combinations', weight:'—' },
        { label:'Rule',     detail:'One pattern at a time — groove before adding next', weight:'—' },
      ]},
      { title:'Free Play', tag:'5 min', rows:[
        { label:'Options',  detail:'Juggling / kettlebell flow / basic tumbling / dance', weight:'—' },
        { label:'Rule',     detail:'Rotate with curiosity — return to rope flow when dry', weight:'—' },
      ]},
    ],
  },
};

let unit = 'kg';
function setUnit(u) {
  unit = u;
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.textContent === u));
  calculate();
}
function roundW(w) { const s = unit==='kg'?2.5:5; return Math.round(w/s)*s; }
function fmt(w) { return (w%1===0?w.toFixed(0):w.toFixed(1))+' '+unit; }
function diffClass(d) { return {hard:'diff-hard',medium:'diff-medium',light:'diff-light'}[d]; }
function pill(d) { const l=d[0].toUpperCase()+d.slice(1); return `<span class="diff-pill ${diffClass(d)}">${l}</span>`; }

function exCard(name, role, rows, extraClass='') {
  const rHTML = rows.map(r=>`
    <div class="ex-row">
      <div class="ex-label">${r.label}</div>
      <div class="ex-detail">${r.detail}</div>
      <div class="ex-weight ${r.cls||'plain'}">${r.weight}</div>
    </div>`).join('');
  return `<div class="ex-card ${extraClass}">
    <div class="ex-head"><div class="ex-name">${name}</div><div class="ex-role">${role}</div></div>
    ${rHTML}
  </div>`;
}

function blockHeader(title, tagClass, tagLabel, extra='') {
  return `<div class="block-header">
    <div class="block-title">${title}</div>
    <span class="block-tag ${tagClass}">${tagLabel}</span>
    ${extra}
  </div>`;
}

function calculate() {
  const dayKey = document.getElementById('day').value;
  const diff   = document.getElementById('difficulty').value;
  const topRaw = parseFloat(document.getElementById('topWeight').value);
  const topBRaw= parseFloat(document.getElementById('topWeightB').value);
  const day    = DAYS[dayKey];
  const scheme = SCHEMES[diff];

  document.getElementById('emptyState').style.display = (topRaw>0)?'none':'block';
  document.getElementById('results').style.display    = (topRaw>0)?'block':'none';
  if (!topRaw||topRaw<=0) return;

  const top  = topRaw;
  const topB = topBRaw>0?topBRaw:null;
  const set1 = roundW(top*scheme.pcts[0]);
  let html   = '';

  // ── A. WARM-UP ────────────────────────────────────────────────────────────
  html += `<div class="session-block">`;
  html += blockHeader('A. Warm-Up','tag-wu','Activation');

  const drillRows = day.warmupDrills.map((d,i)=>({ label:`Step ${i+1}`, detail:d, weight:'—', cls:'muted' }));
  html += exCard('Activation Sequence','movement prep',drillRows);

  const wuRows = WU_PCTS.map((p,i)=>({ label:`WU${i+1}`, detail:`${WU_REPS[i]} reps @ ~${Math.round(p*100)}%`, weight:fmt(roundW(set1*p)), cls:'muted' }));
  html += exCard(day.main,'build-up sets — % of Giant Block Set 1',wuRows);

  if (day.antagonistType==='weighted'&&topB) {
    const antSet1 = roundW(topB*scheme.pcts[0]);
    const wuBRows = WU_PCTS.map((p,i)=>({ label:`WU${i+1}`, detail:`${WU_REPS[i]} reps @ ~${Math.round(p*100)}%`, weight:fmt(roundW(antSet1*p)), cls:'muted' }));
    html += exCard(day.antagonist,'build-up sets — antagonist',wuBRows);
  }
  html += `<p class="block-note">Always start with 2 loose reps with the empty bar before WU1.</p>`;
  html += `</div>`;

  // ── B. GIANT BLOCK ────────────────────────────────────────────────────────
  html += `<div class="session-block">`;
  html += blockHeader('B. Giant Block','tag-gb','4 Rounds · 2 min rest',pill(diff));
  html += `<div class="circuit-note">Circuit order per round: Main lift → Antagonist → Core → 30 sec cardio</div>`;

  // Main lift
  const gbRows = scheme.pcts.map((p,i)=>{
    const isTop = i===scheme.pcts.length-1;
    const w = isTop?top:roundW(top*p);
    return { label:isTop?'Set 4 — Top':`Set ${i+1}`, detail:`${scheme.sets[i]} reps @ ${Math.round(p*100)}%`, weight:fmt(w), cls:isTop?'gold':'' };
  });
  html += exCard(day.main,'main lift',gbRows);

  // Antagonist
  if (day.antagonistType==='hold') {
    html += exCard(day.antagonist,'structural accessory',[{ label:'Each round', detail:'Max hold — sub-maximal effort', weight:'BW', cls:'muted' }]);
  } else if (day.antagonistType==='bw') {
    const pr = PULLUP_REPS[diff];
    html += exCard(day.antagonist,'antagonist — bodyweight',[
      { label:'Each round', detail:`${pr} reps total (cluster sets allowed — 10–15 sec pause OK)`, weight:'BW', cls:'muted' },
      { label:'Progress',   detail:'Consolidate clusters → unbroken → add weight', weight:'—', cls:'muted' },
    ]);
  } else {
    if (topB) {
      const antRows = scheme.pcts.map((p,i)=>{
        const isTop = i===scheme.pcts.length-1;
        const w = isTop?topB:roundW(topB*p);
        return { label:isTop?'Set 4 — Top':`Set ${i+1}`, detail:`${scheme.sets[i]} reps @ ${Math.round(p*100)}%`, weight:fmt(w), cls:isTop?'gold':'' };
      });
      html += exCard(day.antagonist,'antagonist lift',antRows);
    } else {
      html += exCard(day.antagonist,'antagonist lift',[{ label:'Each round', detail:`${scheme.sets.join('-')} reps (same scheme as main)`, weight:'Add weight →', cls:'muted' }]);
    }
  }

  // Core
  const coreName = day.coreFallback ? `${day.core} <span style="font-size:11px;color:var(--muted);font-weight:400">(${day.coreFallback})</span>` : day.core;
  html += exCard(coreName,'core',[{ label:'Each round', detail:'10 reps', weight:'BW', cls:'muted' }]);
  html += exCard('Cardio','conditioning',[{ label:'Each round', detail:'30 sec — high effort', weight:'Row / Bike / Skip', cls:'muted' }]);
  html += `<p class="block-note">Leave 1–2 reps in the tank every set. If Set 1 feels harder than RPE 6–7, back off the top set.</p>`;
  html += `</div>`;

  // ── C. VOLUME BLOCK ───────────────────────────────────────────────────────
  const volW = roundW(top*0.80);
  html += `<div class="session-block">`;
  html += blockHeader('C. Volume Block','tag-vol','Density Work',pill(diff));
  html += exCard(day.main,`80% of top set · 60–90 sec rest between sets`,[
    { label:'Set 1', detail:`${scheme.volReps} reps`, weight:fmt(volW), cls:'blue' },
    { label:'Set 2', detail:`${scheme.volReps} reps`, weight:fmt(volW), cls:'blue' },
  ]);
  html += exCard(day.core,'core — between volume sets',[{ label:'Between sets', detail:'10 reps', weight:'BW', cls:'muted' }]);
  html += `<p class="block-note">Once both sets hit RIR 2+ cleanly, add ${day.type==='upper'?'2.5':'5'}kg next session.</p>`;
  html += `</div>`;

  // ── D. SKILL BLOCK ────────────────────────────────────────────────────────
  html += `<div class="session-block">`;
  html += blockHeader('D. Skill Block','tag-sk','Movement Literacy');

  day.skill.forEach(group => {
    const rows = group.rows.map(r=>({ label:r.label, detail:r.detail, weight:r.weight, cls:'plain' }));
    html += exCard(`${group.title}`, group.tag, rows);
  });

  html += `<p class="block-note">Practice, not training. Stop when focus degrades — not when the clock runs out.</p>`;
  html += `</div>`;

  // ── E. COOLDOWN ───────────────────────────────────────────────────────────
  html += `<div class="session-block">`;
  html += blockHeader('E. Cooldown','tag-cd','Passive Recovery');
  html += exCard(day.cooldown.name,'passive stretch',[
    { label:'Duration', detail:'Hold fully — no bouncing, breathe into the stretch', weight:day.cooldown.duration, cls:'green' },
  ]);
  html += `</div>`;

  document.getElementById('results').innerHTML = html;
}

['day','difficulty','topWeight','topWeightB'].forEach(id=>{
  document.getElementById(id).addEventListener(
    (id==='day'||id==='difficulty')?'change':'input', calculate
  );
});
</script>
</body>
</html>
