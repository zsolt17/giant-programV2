<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Giant Program — Session Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#2E4057; --dark:#1a2535; --gold:#C9A84C; --white:#ffffff;
    --off:#f0f3f7; --muted:#8A9BB0; --border:rgba(201,168,76,0.18);
    --card:rgba(255,255,255,0.04); --blue:#7eb8f7; --green:#8ddcb0; --red:#e88888;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--dark); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,76,0.07) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 90% 90%,rgba(46,64,87,0.5) 0%,transparent 60%); pointer-events:none; z-index:0; }
  .container { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:40px 24px 80px; }
  header { text-align:center; margin-bottom:32px; }
  .eyebrow { font-size:11px; font-weight:500; letter-spacing:0.25em; color:var(--gold); text-transform:uppercase; margin-bottom:10px; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(44px,10vw,72px); line-height:0.9; letter-spacing:0.03em; color:var(--white); margin-bottom:6px; }
  h1 span { color:var(--gold); }
  .header-sub { font-size:13px; color:var(--muted); font-weight:300; letter-spacing:0.04em; }
  .gold-line { width:60px; height:2px; background:var(--gold); margin:16px auto; }

  /* Mode toggle */
  .mode-toggle { display:flex; border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:28px; }
  .mode-btn { flex:1; background:transparent; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:13px; cursor:pointer; letter-spacing:0.1em; text-transform:uppercase; transition:all 0.2s; }
  .mode-btn.active { background:var(--gold); color:var(--dark); }

  /* Input card */
  .input-card { background:var(--card); border:1px solid var(--border); border-radius:2px; padding:28px; margin-bottom:32px; }
  .input-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }
  .input-row2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .field-group { display:flex; flex-direction:column; gap:7px; }
  label { font-size:10px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); }
  label span { color:var(--muted); font-size:9px; text-transform:none; letter-spacing:0; }
  select, input[type="number"] { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:2px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; padding:11px 14px; width:100%; outline:none; transition:border-color 0.2s,background 0.2s; -webkit-appearance:none; appearance:none; }
  select:focus, input[type="number"]:focus { border-color:var(--gold); background:rgba(201,168,76,0.05); }
  select option { background:var(--dark); color:var(--white); }
  input[type="number"]::-webkit-inner-spin-button { opacity:0.3; }
  .unit-toggle { display:flex; border:1px solid rgba(255,255,255,0.12); border-radius:2px; overflow:hidden; }
  .unit-btn { flex:1; background:transparent; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; padding:11px; cursor:pointer; transition:all 0.2s; }
  .unit-btn.active { background:var(--gold); color:var(--dark); }

  /* Empty state */
  #emptyState { text-align:center; padding:56px 24px; color:var(--muted); }
  .empty-icon { font-size:44px; margin-bottom:16px; opacity:0.35; }
  #emptyState p { font-size:14px; font-weight:300; letter-spacing:0.04em; line-height:1.6; }

  /* Session blocks */
  .session-block { margin-bottom:32px; }
  .block-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .block-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.1em; color:var(--gold); }
  .block-tag { font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; padding:3px 9px; border-radius:2px; }
  .tag-wu  { background:rgba(138,155,176,0.15); color:var(--muted); border:1px solid rgba(138,155,176,0.25); }
  .tag-gb  { background:rgba(220,80,80,0.12);   color:var(--red);   border:1px solid rgba(220,80,80,0.25); }
  .tag-vol { background:rgba(126,184,247,0.12); color:var(--blue);  border:1px solid rgba(126,184,247,0.25); }
  .tag-sk  { background:rgba(201,168,76,0.12);  color:var(--gold);  border:1px solid rgba(201,168,76,0.25); }
  .tag-cd  { background:rgba(141,220,176,0.12); color:var(--green); border:1px solid rgba(141,220,176,0.25); }
  .tag-carry { background:rgba(184,160,247,0.12); color:#b8a0f7; border:1px solid rgba(184,160,247,0.25); }
  .tag-cardio { background:rgba(126,184,247,0.12); color:var(--blue); border:1px solid rgba(126,184,247,0.25); }
  .tag-gym  { background:rgba(220,80,80,0.12); color:var(--red); border:1px solid rgba(220,80,80,0.25); }
  .tag-motor { background:rgba(141,220,176,0.12); color:var(--green); border:1px solid rgba(141,220,176,0.25); }

  .diff-pill { margin-left:auto; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; padding:3px 10px; border-radius:2px; }
  .diff-hard   { background:rgba(220,80,80,0.15);   color:var(--red);   border:1px solid rgba(220,80,80,0.3); }
  .diff-medium { background:rgba(201,168,76,0.15);  color:var(--gold);  border:1px solid rgba(201,168,76,0.3); }
  .diff-light  { background:rgba(100,180,120,0.15); color:var(--green); border:1px solid rgba(100,180,120,0.3); }

  /* Exercise cards */
  .ex-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:2px; margin-bottom:8px; overflow:hidden; }
  .ex-head { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.05); }
  .ex-name { font-size:13px; font-weight:600; letter-spacing:0.03em; color:var(--off); }
  .ex-role { font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
  .ex-row { display:grid; grid-template-columns:90px 1fr auto; align-items:center; padding:7px 14px; border-bottom:1px solid rgba(255,255,255,0.03); gap:8px; }
  .ex-row:last-child { border-bottom:none; }
  .ex-label  { font-size:12px; color:var(--muted); }
  .ex-detail { font-size:13px; color:var(--off); }
  .ex-weight { font-size:15px; font-weight:600; text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .ex-weight.gold  { color:var(--gold); }
  .ex-weight.blue  { color:var(--blue); }
  .ex-weight.muted { color:var(--muted); font-size:13px; font-weight:400; }
  .ex-weight.green { color:var(--green); }
  .ex-weight.purple { color:#b8a0f7; }
  .ex-weight.plain { color:var(--off); }
  .circuit-note { font-size:11px; color:var(--muted); letter-spacing:0.08em; padding:6px 14px; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.04); font-style:italic; }
  .block-note { font-size:12px; color:var(--muted); font-style:italic; margin-top:6px; padding-left:12px; border-left:2px solid var(--border); line-height:1.5; }

  footer { text-align:center; margin-top:56px; padding-top:24px; border-top:1px solid var(--border); }
  footer p { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:0.15em; color:var(--muted); }

  @media (max-width:520px) {
    .input-grid { grid-template-columns:1fr 1fr; }
    .container { padding:24px 14px 60px; }
    .input-card { padding:18px 14px; }
    .ex-row { grid-template-columns:64px 1fr auto; padding:7px 10px; }
  }
  @media (max-width:360px) { .input-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">Session Planner</div>
    <h1>THE <span>GIANT</span><br>PROGRAM</h1>
    <div class="gold-line"></div>
    <p class="header-sub">Select your session type to generate the full plan</p>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" id="modeStrength" onclick="setMode('strength')">⚡ Strength Day</button>
    <button class="mode-btn" id="modeSkill" onclick="setMode('skill')">🎯 Skill Day</button>
  </div>

  <!-- STRENGTH UI -->
  <div id="strengthUI">
    <div class="input-card">
      <div class="input-grid">
        <div class="field-group">
          <label>Training Day</label>
          <select id="day">
            <option value="deadlift">Deadlift Day</option>
            <option value="ohp">OHP Day</option>
            <option value="squat">Squat Day</option>
            <option value="bench">Bench Day</option>
          </select>
        </div>
        <div class="field-group">
          <label>Difficulty</label>
          <select id="difficulty">
            <option value="hard">Hard</option>
            <option value="medium">Medium</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="field-group">
          <label>Unit</label>
          <div class="unit-toggle">
            <button class="unit-btn active" onclick="setUnit('kg')">kg</button>
            <button class="unit-btn" onclick="setUnit('lb')">lb</button>
          </div>
        </div>
      </div>
      <div class="input-row2">
        <div class="field-group">
          <label>Top Set — Main Lift</label>
          <input type="number" id="topWeight" placeholder="e.g. 120" min="1" step="0.5">
        </div>
        <div class="field-group">
          <label>Top Set — Antagonist <span>(optional, upper days)</span></label>
          <input type="number" id="topWeightB" placeholder="e.g. 70" min="1" step="0.5">
        </div>
      </div>
    </div>
    <div id="emptyState">
      <div class="empty-icon">🏋️</div>
      <p>Select your training day and enter<br>your top set weight to generate<br>the full session plan</p>
    </div>
    <div id="results"></div>
  </div>

  <!-- SKILL DAY UI -->
  <div id="skillUI" style="display:none;">
    <div id="skillResults"></div>
  </div>

  <footer>
    <p>Train Hard &nbsp;·&nbsp; Train Smart &nbsp;·&nbsp; Stay Capable</p>
  </footer>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const SCHEMES = {
  hard:   { sets:[8,6,4,2],  pcts:[0.75,0.82,0.90,1.00], volReps:6  },
  medium: { sets:[9,7,5,3],  pcts:[0.72,0.80,0.88,1.00], volReps:8  },
  light:  { sets:[10,8,6,4], pcts:[0.70,0.78,0.86,1.00], volReps:10 },
};
const WU_PCTS = [0.40,0.55,0.70,0.85];
const WU_REPS = [8,5,3,2];
const PULLUP_REPS = { hard:10, medium:8, light:6 };

const DAYS = {
  deadlift: {
    label:'Deadlift Day', type:'lower',
    main:'Deadlift', antagonist:'Sørensen Hold', antagonistType:'hold', core:'Ab Rollout',
    warmupDrills:['2 min row / bike / jump rope','Jefferson curl × 5 slow reps','Empty bar Romanian DL × 8 — hamstring stretch focus'],
    cooldown:{ name:'Forward Fold', duration:'2 min' },
    carry:{ name:"Farmer's Carry", load:'50–60 kg / hand', distance:'20–30 m', sets:'3–4 sets', progress:'M1: lock position · M2: +5kg/hand · M3: +5kg/hand' },
    skill:[{ title:'Focused Skill — Current Cycle', tag:'15–20 min', rows:[
      { label:'Option A', detail:'Turkish get-up — 5–6/side alternating, full rest between reps, 10–12 total', weight:'12 kg' },
      { label:'Option B', detail:'Animal flow — beast crawl → kickthrough → beast-to-crab → crab reach → underswitch', weight:'BW' },
      { label:'Option C', detail:'Floor-to-stand — cross-legged ×3, shin box ×3/side, roll-to-squat ×4, roll-to-lunge ×3/side', weight:'BW' },
      { label:'Rule',     detail:'Pick ONE skill per macrocycle and stay with it. Rotate next cycle.', weight:'—' },
    ]}],
  },
  ohp: {
    label:'OHP Day', type:'upper',
    main:'Overhead Press', antagonist:'Pull-ups', antagonistType:'bw', core:'GHD Abs', coreFallback:'Hollow Body Hold if GHD unavailable',
    warmupDrills:['2 min light row or arm circles','Prone banded shoulder extension × 10','Empty bar press × 10 — pause at top','Dead hang × 20–30 sec + 3–5 scapular pulls'],
    cooldown:{ name:'Anterior Line Stretch', duration:'2 min per side' },
    carry:{ name:'Suitcase Carry', load:'40–50 kg / hand', distance:'20 m / side', sets:'3–4 sets', progress:'M1: lock position · M2: +5kg/hand · M3: +5kg/hand' },
    skill:[{ title:'Focused Skill — Current Cycle', tag:'15–20 min', rows:[
      { label:'Option A', detail:'Double unders — 3–4 max unbroken sets + 5–10 min on one variation (crosses / single leg / alt)', weight:'—' },
      { label:'Option B', detail:'Rope flow — one pattern at a time: waves → figure-8s → side circles', weight:'—' },
      { label:'Option C', detail:'Kettlebell flow — swings, cleans, presses linked in sequence', weight:'—' },
      { label:'Rule',     detail:'Pick ONE skill per macrocycle and stay with it. Rotate next cycle.', weight:'—' },
    ]}],
  },
  squat: {
    label:'Squat Day', type:'lower',
    main:'Back Squat', antagonist:'Copenhagen Plank', antagonistType:'hold', core:'Leg Raises',
    warmupDrills:['2 min row / bike','Reverse nordic × 5 slow reps','Goblet squat × 8 deep and slow'],
    cooldown:{ name:'Couch Stretch', duration:'2 min per side' },
    carry:{ name:'Sandbag Bear Hug Carry', load:'40–50 kg sandbag', distance:'20–30 m', sets:'3–4 sets', progress:'M1: lock position · M2: next bag up · M3: next bag up' },
    skill:[{ title:'Focused Skill — Current Cycle', tag:'15–20 min', rows:[
      { label:'Option A', detail:'Double unders — 3–4 max unbroken sets, track max in notebook, then one variation focus', weight:'—' },
      { label:'Option B', detail:'Jump rope skill — crosses / single leg / alternate leg, one at a time per cycle', weight:'—' },
      { label:'Option C', detail:'Bounding — single leg hops ×10/side, lateral bounds ×5/dir, hurdle hops ×10', weight:'BW' },
      { label:'Rule',     detail:'Pick ONE skill per macrocycle and stay with it. Rotate next cycle.', weight:'—' },
    ]}],
  },
  bench: {
    label:'Bench Day', type:'upper',
    main:'Bench Press', antagonist:'Barbell Row', antagonistType:'weighted', core:'GHD Back Extension',
    warmupDrills:['2 min light movement','Skin the cat × 3–5 controlled reps','Empty bar bench × 10 — pause at bottom','Band pull-apart × 15 reps × 2 sets, controlled tempo'],
    cooldown:{ name:'Bottom of Dip Hold', duration:'2 min' },
    carry:{ name:'Overhead Carry', load:'20–24 kg / hand', distance:'20 m / side', sets:'3–4 sets', progress:'M1: lock position · M2: +4–5kg · M3: +4–5kg · Drop weight if shoulder fatigued' },
    skill:[{ title:'Focused Skill — Current Cycle', tag:'15–20 min', rows:[
      { label:'Phase 1',   detail:'Muscle-up progressions: ring rows 3×8–10 → jumping negatives 3×3–5 → banded transitions 3×3–5 → strict attempts', weight:'—' },
      { label:'Phase 2',   detail:'Sandbag work: clean ×5 ×3–4 sets · carry 20–30m ×3–4 sets · shouldering ×3–5/side', weight:'—' },
      { label:'Always',    detail:'Rope flow — 5–10 min permanent fixture after main skill', weight:'—' },
      { label:'Free play', detail:'Juggling / kettlebell flow / tumbling / dance — remaining time', weight:'—' },
    ]}],
  },
};

// ── Skill day data ────────────────────────────────────────────────────────────
const CARDIO_FORMATS = [
  { name:':30/:30 Single Tool', detail:':30 bike (or row / ski / jump rope) · :30 rest × 30 sets', duration:'30 min', note:'Simplest option — structure enforces correct intensity automatically' },
  { name:':30/:30 Two Tools', detail:':30 row · :30 rest × 15, then :30 bike · :30 rest × 15', duration:'30 min', note:'Rotate equipment halfway for variety' },
  { name:'Monostructural Repeats', detail:'500m row × 10 sets · 60 sec rest between sets', duration:'~30 min', note:'Adjust distance so each rep takes ~2 min at sustainable pace' },
  { name:'Three Tool Circuit', detail:'Every 3 min: 15 cal row + 12 cal bike + 9 cal ski × 10 sets', duration:'30 min', note:'Scale calories so each round takes ~2:00–2:15' },
  { name:'Descending Intervals', detail:':60 bike · :30 rest · :60 row · :30 rest × 10 rounds', duration:'30 min', note:'Good option when energy is lower — longer rest built in' },
];

const GYMNASTICS_PHASES = [
  { phase:'Current', skill:'Handstand', program:'Ganbaru app — 12-week program', trigger:'Complete the program', duration:'15–20 min/session' },
  { phase:'Next', skill:'Handstand Walk', program:'Dedicated progression once freestanding HS is consistent', trigger:'Freestanding HS holdable and repeatable', duration:'15–20 min/session' },
  { phase:'After', skill:'Muscle-Up Progressions', program:'Ring rows → jumping negatives → banded transitions → strict attempts', trigger:'Pull-ups unbroken across all Giant Block rounds', duration:'15–20 min/session' },
];

const MOTOR_CIRCUIT = [
  { label:'Animal Flow', detail:'Beast crawl 10m → crab reach ×5/side → side kickthrough ×3/side → croc crawl 10m', weight:'3 min', cls:'plain' },
  { label:'Turkish Get-Up', detail:'2–3 reps per side — full rest between reps, stand/breathe/reset. Progress: 12→16→20→24kg', weight:'12 kg · 3 min', cls:'gold' },
  { label:'Rope Flow', detail:'One pattern only — groove before adding next: waves → figure-8s → side circles', weight:'2 min', cls:'plain' },
  { label:'Floor-to-Stand', detail:'Cross-legged ×3 · shin box ×3/side · roll-to-squat ×4 · roll-to-lunge ×3/side', weight:'2 min', cls:'plain' },
];

// ── State ─────────────────────────────────────────────────────────────────────
let unit = 'kg';
let mode = 'strength';

function setMode(m) {
  mode = m;
  document.getElementById('strengthUI').style.display = m==='strength' ? 'block' : 'none';
  document.getElementById('skillUI').style.display    = m==='skill'    ? 'block' : 'none';
  document.getElementById('modeStrength').classList.toggle('active', m==='strength');
  document.getElementById('modeSkill').classList.toggle('active',    m==='skill');
  if (m==='skill') renderSkillDay();
}

function setUnit(u) {
  unit = u;
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.toggle('active',b.textContent===u));
  calculate();
}

function roundW(w) { const s=unit==='kg'?2.5:5; return Math.round(w/s)*s; }
function fmt(w) { return (w%1===0?w.toFixed(0):w.toFixed(1))+' '+unit; }
function diffClass(d) { return {hard:'diff-hard',medium:'diff-medium',light:'diff-light'}[d]; }
function pill(d) { const l=d[0].toUpperCase()+d.slice(1); return `<span class="diff-pill ${diffClass(d)}">${l}</span>`; }

function exCard(name, role, rows) {
  const rHTML = rows.map(r=>`<div class="ex-row"><div class="ex-label">${r.label}</div><div class="ex-detail">${r.detail}</div><div class="ex-weight ${r.cls||'plain'}">${r.weight}</div></div>`).join('');
  return `<div class="ex-card"><div class="ex-head"><div class="ex-name">${name}</div><div class="ex-role">${role}</div></div>${rHTML}</div>`;
}

function blockHdr(title, tagClass, tagLabel, extra='') {
  return `<div class="block-header"><div class="block-title">${title}</div><span class="block-tag ${tagClass}">${tagLabel}</span>${extra}</div>`;
}

// ── Skill Day Render ──────────────────────────────────────────────────────────
function renderSkillDay() {
  let html = '';

  // A. Cardio
  html += `<div class="session-block">`;
  html += blockHdr('A. Cardio','tag-cardio','30 min · RPE 6–7');
  html += exCard('Session Formats','rotate for variety — pick one per session',
    CARDIO_FORMATS.map(f=>({ label:f.name, detail:`${f.detail} — ${f.note}`, weight:f.duration, cls:'blue' })));
  html += `<p class="block-note">Target intensity: you can speak in full sentences. Never push beyond RPE 7. The 30/30 format is the default — structure enforces correct intensity automatically.</p>`;
  html += `</div>`;

  // B. Gymnastics
  html += `<div class="session-block">`;
  html += blockHdr('B. Gymnastics Skill','tag-gym','15–20 min · One focus per macrocycle');
  html += exCard('Skill Progression Roadmap','one phase at a time — never mix skills',
    GYMNASTICS_PHASES.map(g=>({ label:g.phase, detail:`${g.skill} — ${g.program} · Advance when: ${g.trigger}`, weight:g.duration, cls: g.phase==='Current'?'gold':g.phase==='Next'?'plain':'muted' })));
  html += `<p class="block-note">Current focus: Handstand via Ganbaru app. Never train to failure — stop when form degrades. One clean rep is worth ten sloppy ones.</p>`;
  html += `</div>`;

  // C. Motor Circuit
  html += `<div class="session-block">`;
  html += blockHdr('C. Motor Circuit','tag-motor','10–12 min · Same every session');
  html += `<div class="circuit-note">Permanent, unchanging circuit — automaticity is the point. No decisions, just execute.</div>`;
  html += exCard('The Circuit','animal flow → TGU → rope flow → floor-to-stand', MOTOR_CIRCUIT);
  html += `<p class="block-note">This circuit never changes. Only the gymnastics block evolves. Covers all motor pattern gaps that strength training leaves — rotation, ground transitions, unilateral load, rhythm, spinal mobility.</p>`;
  html += `</div>`;

  document.getElementById('skillResults').innerHTML = html;
}

// ── Strength Day Render ───────────────────────────────────────────────────────
function calculate() {
  const dayKey = document.getElementById('day').value;
  const diff   = document.getElementById('difficulty').value;
  const topRaw = parseFloat(document.getElementById('topWeight').value);
  const topBRaw= parseFloat(document.getElementById('topWeightB').value);
  const day    = DAYS[dayKey];
  const scheme = SCHEMES[diff];

  document.getElementById('emptyState').style.display = (topRaw>0)?'none':'block';
  document.getElementById('results').style.display    = (topRaw>0)?'block':'none';
  if (!topRaw||topRaw<=0) return;

  const top  = topRaw;
  const topB = topBRaw>0?topBRaw:null;
  const set1 = roundW(top*scheme.pcts[0]);
  let html   = '';

  // A. Warm-up
  html += `<div class="session-block">`;
  html += blockHdr('A. Warm-Up','tag-wu','Activation');
  html += exCard('Activation Sequence','movement prep', day.warmupDrills.map((d,i)=>({label:`Step ${i+1}`,detail:d,weight:'—',cls:'muted'})));
  html += exCard(day.main,'build-up sets — % of Giant Block Set 1', WU_PCTS.map((p,i)=>({label:`WU${i+1}`,detail:`${WU_REPS[i]} reps @ ~${Math.round(p*100)}%`,weight:fmt(roundW(set1*p)),cls:'muted'})));
  if (day.antagonistType==='weighted'&&topB) {
    const antSet1=roundW(topB*scheme.pcts[0]);
    html += exCard(day.antagonist,'build-up sets — antagonist', WU_PCTS.map((p,i)=>({label:`WU${i+1}`,detail:`${WU_REPS[i]} reps @ ~${Math.round(p*100)}%`,weight:fmt(roundW(antSet1*p)),cls:'muted'})));
  }
  html += `<p class="block-note">Always start with 2 loose reps with the empty bar before WU1.</p>`;
  html += `</div>`;

  // B. Giant Block
  html += `<div class="session-block">`;
  html += blockHdr('B. Giant Block','tag-gb','4 Rounds · 2 min rest',pill(diff));
  html += `<div class="circuit-note">Circuit order per round: Main lift → Antagonist → Core → 30 sec cardio</div>`;
  html += exCard(day.main,'main lift', scheme.pcts.map((p,i)=>{
    const isTop=i===scheme.pcts.length-1; const w=isTop?top:roundW(top*p);
    return {label:isTop?'Set 4 — Top':`Set ${i+1}`,detail:`${scheme.sets[i]} reps @ ${Math.round(p*100)}%`,weight:fmt(w),cls:isTop?'gold':''};
  }));
  if (day.antagonistType==='hold') {
    html += exCard(day.antagonist,'structural accessory',[{label:'Each round',detail:'Max hold — sub-maximal effort',weight:'BW',cls:'muted'}]);
  } else if (day.antagonistType==='bw') {
    const pr=PULLUP_REPS[diff];
    html += exCard(day.antagonist,'antagonist — bodyweight',[
      {label:'Each round',detail:`${pr} reps total (cluster sets allowed — 10–15 sec pause OK)`,weight:'BW',cls:'muted'},
      {label:'Progress',detail:'Consolidate clusters → unbroken → add weight',weight:'—',cls:'muted'},
    ]);
  } else if (topB) {
    html += exCard(day.antagonist,'antagonist lift', scheme.pcts.map((p,i)=>{
      const isTop=i===scheme.pcts.length-1; const w=isTop?topB:roundW(topB*p);
      return {label:isTop?'Set 4 — Top':`Set ${i+1}`,detail:`${scheme.sets[i]} reps @ ${Math.round(p*100)}%`,weight:fmt(w),cls:isTop?'gold':''};
    }));
  } else {
    html += exCard(day.antagonist,'antagonist lift',[{label:'Each round',detail:`${scheme.sets.join('-')} reps`,weight:'Add weight →',cls:'muted'}]);
  }
  const coreName = day.coreFallback ? `${day.core} <span style="font-size:11px;color:var(--muted);font-weight:400">(${day.coreFallback})</span>` : day.core;
  html += exCard(coreName,'core',[{label:'Each round',detail:'10 reps',weight:'BW',cls:'muted'}]);
  html += exCard('Cardio','conditioning',[{label:'Each round',detail:'30 sec — high effort',weight:'Row / Bike / Skip',cls:'muted'}]);
  html += `<p class="block-note">Leave 1–2 reps in the tank every set. If Set 1 feels harder than RPE 6–7, back off the top set.</p>`;
  html += `</div>`;

  // C. Volume Block
  const volW=roundW(top*0.80);
  html += `<div class="session-block">`;
  html += blockHdr('C. Volume Block','tag-vol','Density Work',pill(diff));
  html += exCard(day.main,`80% of top set · 60–90 sec rest between sets`,[
    {label:'Set 1',detail:`${scheme.volReps} reps`,weight:fmt(volW),cls:'blue'},
    {label:'Set 2',detail:`${scheme.volReps} reps`,weight:fmt(volW),cls:'blue'},
  ]);
  html += exCard(day.core,'core — between volume sets',[{label:'Between sets',detail:'10 reps',weight:'BW',cls:'muted'}]);
  html += `<p class="block-note">Once both sets hit RIR 2+ cleanly, add ${day.type==='upper'?'2.5':'5'}kg next session.</p>`;
  html += `</div>`;

  // D. Carry Finisher
  const c=day.carry;
  html += `<div class="session-block">`;
  html += blockHdr('D. Carry Finisher','tag-carry','10 min');
  html += exCard(c.name,'loaded locomotion finisher',[
    {label:'Load',    detail:'Starting recommendation — adjust based on feel',weight:c.load,    cls:'purple'},
    {label:'Distance',detail:'Per set',                                        weight:c.distance,cls:'plain'},
    {label:'Sets',    detail:'Rest just enough to walk back and reset',        weight:c.sets,    cls:'plain'},
    {label:'Progress',detail:c.progress,                                       weight:'—',       cls:'muted'},
    {label:'Rule',    detail:'Finish each length with 3–4 steps still in reserve — never grind position',weight:'—',cls:'muted'},
  ]);
  html += `</div>`;

  // E. Cooldown
  html += `<div class="session-block">`;
  html += blockHdr('E. Cooldown','tag-cd','Passive Recovery');
  html += exCard(day.cooldown.name,'passive stretch',[{label:'Duration',detail:'Hold fully — no bouncing, breathe into the stretch',weight:day.cooldown.duration,cls:'green'}]);
  html += `</div>`;

  document.getElementById('results').innerHTML = html;
}

['day','difficulty','topWeight','topWeightB'].forEach(id=>{
  document.getElementById(id).addEventListener((id==='day'||id==='difficulty')?'change':'input', calculate);
});
</script>
</body>
</html>
