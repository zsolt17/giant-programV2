<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Giant Program</title>
    <meta name="theme-color" content="#1a2535" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Giant" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* Instant splash — paints before the JS bundle runs, removed once React mounts. */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #1a2535;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash .wm {
        font-family: 'Bebas Neue', system-ui, sans-serif;
        font-size: 34px;
        letter-spacing: 0.04em;
        color: #fff;
      }
      #splash .wm b { color: #c9a84c; font-weight: inherit; }
      #splash .sp {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(201, 168, 76, 0.25);
        border-top-color: #c9a84c;
        border-radius: 50%;
        animation: gp-spin 0.7s linear infinite;
      }
      @keyframes gp-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body style="margin:0;background:#1a2535">
    <div id="splash">
      <div class="wm">THE <b>GIANT</b> PROGRAM</div>
      <div class="sp"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
