<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Giant Program</title>
    <meta name="theme-color" content="#1a2535" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Giant" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* Splash visual — defined once here (paints before the JS bundle runs). The
         `.gp-splash` class is REUSED by the React <SplashScreen/> (components.tsx) so
         the splash can stay on screen through the first data load on a logged-in
         reopen. The pre-React copy keeps id="splash" so main.tsx can fade+remove it
         on mount; React then shows an identical .gp-splash until data is ready.
         The mark is the actual home-screen icon, for icon→splash continuity. */
      .gp-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a2535;
        font-family: 'DM Sans', system-ui, sans-serif;
        transition: opacity 0.35s ease;
      }
      .gp-splash .mark {
        width: 76px;
        height: 76px;
        border-radius: 18px;
        border: 1.5px solid #c9a84c80;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
      }
      .gp-splash .name {
        margin-top: 16px;
        font-size: 18px;
        letter-spacing: 0.12em;
        color: #e8e8e8;
        font-weight: 500;
      }
      .gp-splash .bar {
        margin-top: 24px;
        width: 120px;
        height: 2px;
        border-radius: 2px;
        background-color: #2e4057;
        background-image: linear-gradient(90deg, transparent, #c9a84c, transparent);
        background-size: 50% 100%;
        background-repeat: no-repeat;
        animation: gp-shimmer 1.4s ease-in-out infinite;
      }
      @keyframes gp-shimmer {
        0% { background-position: -50% 0; }
        100% { background-position: 150% 0; }
      }
    </style>
  </head>
  <body style="margin:0;background:#1a2535">
    <div id="splash" class="gp-splash">
      <img class="mark" src="./icon-192.png" alt="" />
      <div class="name">THE GIANT PROGRAM</div>
      <div class="bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
